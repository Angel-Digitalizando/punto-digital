<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo azul institucional argentino -->
  <rect width="512" height="512" rx="80" fill="#0B5AA2"/>
  <!-- Globo / red — simboliza conectividad comunitaria -->
  <circle cx="256" cy="220" r="110" fill="none" stroke="#37B5E5" stroke-width="18"/>
  <!-- Meridianos -->
  <ellipse cx="256" cy="220" rx="55" ry="110" fill="none" stroke="#37B5E5" stroke-width="12"/>
  <!-- Paralelo central -->
  <line x1="146" y1="220" x2="366" y2="220" stroke="#37B5E5" stroke-width="12"/>
  <!-- Paralelo superior -->
  <path d="M170 168 Q256 158 342 168" fill="none" stroke="#37B5E5" stroke-width="10"/>
  <!-- Paralelo inferior -->
  <path d="M170 272 Q256 282 342 272" fill="none" stroke="#37B5E5" stroke-width="10"/>
  <!-- Texto "PD" -->
  <text x="256" y="400"
        font-family="Arial, sans-serif"
        font-size="72"
        font-weight="bold"
        fill="white"
        text-anchor="middle">PD</text>
</svg>
